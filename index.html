<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seja Create — Plataforma de Gestão</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Nunito:wght@800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <!-- Tema: aplicar antes do render para evitar flash -->
  <script>(function(){var t=localStorage.getItem('sc-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- Supabase SDK — carregado antes dos módulos JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen">
  <div class="login-bg"></div>
  <div class="login-box">
    <div class="login-logo">
      <span class="logo-icon">
        <svg width="26" height="26" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="13" stroke="white" stroke-width="5.5" fill="none"
            stroke-dasharray="61.3 20.4" stroke-linecap="round" transform="rotate(45 20 20)"/>
          <rect x="9" y="13" width="16" height="11" rx="3" fill="white"/>
          <path d="M13 24L10 30.5L21 24Z" fill="white"/>
          <circle cx="13.5" cy="18.5" r="1.7" fill="#4c1d95"/>
          <circle cx="17" cy="18.5" r="1.7" fill="#4c1d95"/>
          <circle cx="20.5" cy="18.5" r="1.7" fill="#4c1d95"/>
        </svg>
      </span>
      <span class="logo-text">seja <strong>create</strong></span>
    </div>
    <p class="login-subtitle">Plataforma de Gestão para Agências</p>
    <div class="login-form">
      <div class="form-group">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com" value="admin@sejacreate.com" />
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="login-pass" placeholder="••••••••" value="123456" />
      </div>
      <div class="login-roles">
        <label>Perfil de demonstração:</label>
        <select id="login-role">
          <option value="admin">Administrador</option>
          <option value="gestor">Gestor</option>
          <option value="social">Social Media</option>
          <option value="designer">Designer</option>
          <option value="comercial">Comercial</option>
          <option value="financeiro">Financeiro</option>
          <option value="cliente">Cliente</option>
        </select>
      </div>
      <button class="btn-login" data-action="login"><i class="fas fa-sign-in-alt"></i> Entrar na plataforma</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" class="app hidden">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="13" stroke="white" stroke-width="5.5" fill="none"
              stroke-dasharray="61.3 20.4" stroke-linecap="round" transform="rotate(45 20 20)"/>
            <rect x="9" y="13" width="16" height="11" rx="3" fill="white"/>
            <path d="M13 24L10 30.5L21 24Z" fill="white"/>
            <circle cx="13.5" cy="18.5" r="1.7" fill="#4c1d95"/>
            <circle cx="17" cy="18.5" r="1.7" fill="#4c1d95"/>
            <circle cx="20.5" cy="18.5" r="1.7" fill="#4c1d95"/>
          </svg>
        </span>
        <span class="logo-text">seja <strong>create</strong></span>
      </div>
      <button class="sidebar-toggle" data-action="toggle-sidebar"><i class="fas fa-bars"></i></button>
    </div>

    <div class="user-info">
      <div class="user-avatar" id="user-avatar">A</div>
      <div class="user-details">
        <span class="user-name" id="user-name">Admin Geral</span>
        <span class="user-role" id="user-role-label">Administrador</span>
      </div>
    </div>

    <nav class="nav-menu">
      <div class="nav-section">
        <span class="nav-section-title">Principal</span>
        <a class="nav-item active" data-page="dashboard" data-action="navigate" data-page="dashboard">
          <i class="fas fa-home"></i><span>Dashboard</span>
        </a>
        <a class="nav-item" data-page="avisos" data-action="navigate" data-page="avisos">
          <i class="fas fa-bell"></i><span>Avisos Importantes</span>
          <span class="badge" id="badge-avisos">7</span>
        </a>
      </div>
      <div class="nav-section" id="nav-comercial">
        <span class="nav-section-title">Comercial</span>
        <a class="nav-item" data-page="crm" data-action="navigate" data-page="crm">
          <i class="fas fa-funnel-dollar"></i><span>CRM</span>
        </a>
        <a class="nav-item" data-page="cadastro" data-action="navigate" data-page="cadastro">
          <i class="fas fa-address-book"></i><span>Cadastro</span>
        </a>
      </div>
      <div class="nav-section" id="nav-operacional">
        <span class="nav-section-title">Operacional</span>
        <a class="nav-item" data-page="tarefas" data-action="navigate" data-page="tarefas">
          <i class="fas fa-columns"></i><span>Gestão de Tarefas</span>
        </a>
        <a class="nav-item" data-page="calendario" data-action="navigate" data-page="calendario">
          <i class="fas fa-calendar-alt"></i><span>Calendário</span>
        </a>
      </div>
      <div class="nav-section" id="nav-financeiro">
        <span class="nav-section-title">Financeiro</span>
        <a class="nav-item" data-page="financeiro" data-action="navigate" data-page="financeiro">
          <i class="fas fa-dollar-sign"></i><span>Financeiro</span>
        </a>
      </div>
      <div class="nav-section" id="nav-relatorios">
        <span class="nav-section-title">Análise</span>
        <a class="nav-item" data-page="relatorios" data-action="navigate" data-page="relatorios">
          <i class="fas fa-chart-bar"></i><span>Relatórios</span>
        </a>
      </div>
      <div class="nav-section" id="nav-config">
        <span class="nav-section-title">Sistema</span>
        <a class="nav-item" data-page="configuracoes" data-action="navigate" data-page="configuracoes">
          <i class="fas fa-cog"></i><span>Configurações</span>
        </a>
        <a class="nav-item" data-page="cliente-area" data-action="navigate" data-page="cliente-area">
          <i class="fas fa-user-check"></i><span>Área do Cliente</span>
        </a>
      </div>
    </nav>

    <div class="sidebar-footer">
      <button class="btn-logout" data-action="logout"><i class="fas fa-sign-out-alt"></i> <span>Sair</span></button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content" id="main-content">
    <!-- TOPBAR -->
    <header class="topbar">
      <div class="topbar-left">
        <button class="mobile-toggle" data-action="toggle-sidebar"><i class="fas fa-bars"></i></button>
        <div class="page-breadcrumb" id="page-breadcrumb">Dashboard</div>
      </div>
      <div class="topbar-right">
        <div class="search-box">
          <i class="fas fa-search"></i>
          <input type="text" placeholder="Buscar clientes, tarefas..." />
        </div>
        <button class="topbar-btn" id="theme-toggle-btn" onclick="toggleTheme()" title="Alternar tema">
          <i class="fas fa-sun" id="theme-icon"></i>
        </button>
        <button class="topbar-btn" data-action="navigate" data-page="avisos">
          <i class="fas fa-bell"></i>
          <span class="notif-dot"></span>
        </button>
        <div class="topbar-user" data-action="logout">
          <div class="topbar-avatar" id="topbar-avatar">A</div>
        </div>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <div class="page-wrapper" id="page-content">
      <!-- dinâmico via JS -->
    </div>
  </main>
</div>

<!-- ── Camada 1: Configuração ──────────────────────── -->
<script src="js/config.js"></script>

<!-- ── Camada 2: Dados e cliente Supabase ────────── -->
<script src="js/data.js"></script>
<script src="js/supabase.js"></script>

<!-- ── Camada 3: Utils (sem dependências externas) ── -->
<script src="js/utils/formatters.js"></script>
<script src="js/utils/validators.js"></script>
<script src="js/utils/domHelpers.js"></script>
<script src="js/utils/storageHelpers.js"></script>

<!-- ── Camada 4: Components ──────────────────────── -->
<script src="js/components/toast.js"></script>
<script src="js/components/modal.js"></script>
<script src="js/components/statusTag.js"></script>

<!-- ── Camada 5: Services ────────────────────────── -->
<script src="js/services/authService.js"></script>
<script src="js/services/metaService.js"></script>
<script src="js/services/clientService.js"></script>
<script src="js/services/financialService.js"></script>
<script src="js/services/taskService.js"></script>
<script src="js/services/leadService.js"></script>
<script src="js/services/notificationService.js"></script>
<script src="js/services/dataService.js"></script>

<!-- ── Camada 6: Core (router, events, permissions) ─ -->
<script src="js/core/router.js"></script>
<script src="js/core/permissions.js"></script>
<script src="js/app.js"></script>
<script src="js/core/events.js"></script>

<!-- ── Camada 7: Páginas ─────────────────────────── -->
<script src="js/dashboard.js"></script>
<script src="js/avisos.js"></script>
<script src="js/crm.js"></script>
<script src="js/cadastro.js"></script>
<script src="js/tarefas.js"></script>
<script src="js/calendario.js"></script>
<script src="js/financeiro/index.js"></script>
<script src="js/financeiro/visaoGeral.js"></script>
<script src="js/financeiro/receber.js"></script>
<script src="js/financeiro/pagar.js"></script>
<script src="js/financeiro/lancamentos.js"></script>
<script src="js/financeiro/fluxoCaixa.js"></script>
<script src="js/financeiro/dre.js"></script>
<script src="js/financeiro/planoDeContas.js"></script>
<script src="js/relatorios.js"></script>
<script src="js/configuracoes.js"></script>
<script src="js/cliente-area.js"></script>
</body>
</html>
